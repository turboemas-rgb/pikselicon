<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siatka 7×7 — generator wzorków</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#0e0e13;
    --panel:#17171f;
    --panel-2:#1e1e28;
    --line:#2a2a37;
    --line-soft:#22222e;
    --txt:#e7e6f0;
    --txt-dim:#9a99ab;
    --txt-faint:#6a6a7c;
    --acc:#5B19FF;
    --acc-dim:#4a14cc;
    --acc-txt:#9b7bff;
    --grid-cell:#e7e6f0;
    --grid-bg:#0e0e13;
    --guide:#2a2a37;
    --danger:#ff8a8a;
    --radius:10px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    background:var(--bg);
    color:var(--txt);
    line-height:1.5;
    padding:22px;
    min-height:100vh;
  }

  .wrap{max-width:1080px;margin:0 auto}

  header{
    display:flex;align-items:baseline;gap:14px;
    padding-bottom:16px;margin-bottom:22px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  header h1{
    font-size:15px;font-weight:700;letter-spacing:.02em;
  }
  header h1 .grid7{color:var(--acc-txt)}
  header .sub{font-size:12px;color:var(--txt-faint);font-weight:400}

  .layout{
    display:grid;
    grid-template-columns:minmax(0,1fr) 320px;
    gap:22px;
    align-items:start;
  }

  /* ---------- canvas column ---------- */
  .stage{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:22px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
  }
  .board-frame{
    width:100%;
    max-width:440px;
    aspect-ratio:1/1;
    background:
      repeating-linear-gradient(0deg,transparent 0 23px,var(--line-soft) 23px 24px),
      repeating-linear-gradient(90deg,transparent 0 23px,var(--line-soft) 23px 24px),
      var(--panel-2);
    background-size:24px 24px,24px 24px,auto;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
    touch-action:none;
  }
  #board{width:100%;height:100%;display:block;cursor:crosshair}
  #board rect.cell{transition:fill .06s linear}

  .stage-tools{
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;
  }

  /* ---------- side panel ---------- */
  .panel{
    display:flex;flex-direction:column;gap:16px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
  }
  .card h2{
    font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--txt-faint);margin-bottom:13px;
    display:flex;align-items:center;gap:8px;
  }
  .card h2::after{content:"";flex:1;height:1px;background:var(--line-soft)}

  /* buttons */
  button{
    font-family:inherit;font-size:12px;
    background:var(--panel-2);
    color:var(--txt);
    border:1px solid var(--line);
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
    transition:border-color .12s,background .12s,color .12s;
    white-space:nowrap;
  }
  button:hover{border-color:var(--acc-dim);color:#fff}
  button:active{transform:translateY(1px)}
  button.primary{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700}
  button.primary:hover{background:#7038ff;color:#fff;border-color:#7038ff}
  button.ghost{background:transparent}
  button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}

  .btn-row{display:flex;gap:8px;flex-wrap:wrap}
  .btn-row button{flex:1;min-width:0;text-align:center}

  /* icon library */
  .icons{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  }
  .icon-btn{
    aspect-ratio:1/1;padding:6px;display:flex;align-items:center;justify-content:center;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;cursor:pointer;
    transition:border-color .12s,background .12s;
  }
  .icon-btn:hover{border-color:var(--acc)}
  .icon-btn svg{width:100%;height:100%;display:block}
  .icon-btn svg rect{fill:var(--txt-dim)}
  .icon-btn:hover svg rect{fill:var(--acc-txt)}

  /* controls */
  .ctrl{margin-bottom:13px}
  .ctrl:last-child{margin-bottom:0}
  .ctrl label{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--txt-dim);margin-bottom:6px;
  }
  .ctrl label .val{color:var(--acc-txt);font-weight:500}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;border-radius:2px;
    background:var(--line);outline:none;cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--acc);cursor:pointer;border:2px solid var(--panel);
  }
  input[type=range]::-moz-range-thumb{
    width:15px;height:15px;border-radius:50%;background:var(--acc);cursor:pointer;border:2px solid var(--panel);
  }
  select{
    width:100%;font-family:inherit;font-size:12px;
    background:var(--panel-2);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;cursor:pointer;
  }
  select:focus-visible{outline:2px solid var(--acc);outline-offset:2px}

  .color-row{display:flex;gap:10px}
  .color-field{flex:1}
  .color-field span{display:block;font-size:11px;color:var(--txt-dim);margin-bottom:6px}
  .color-input{
    display:flex;align-items:center;gap:8px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:4px 8px 4px 5px;
  }
  input[type=color]{
    -webkit-appearance:none;appearance:none;width:26px;height:26px;padding:0;border:none;
    border-radius:6px;background:none;cursor:pointer;flex:none;
  }
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:1px solid var(--line);border-radius:6px}
  .color-input input[type=text]{
    flex:1;min-width:0;font-family:inherit;font-size:11px;background:none;border:none;
    color:var(--txt);outline:none;text-transform:uppercase;
  }

  .check{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--txt-dim);cursor:pointer;user-select:none}
  .check input{
    -webkit-appearance:none;appearance:none;width:16px;height:16px;flex:none;
    border:1px solid var(--line);border-radius:5px;background:var(--panel-2);cursor:pointer;position:relative;
  }
  .check input:checked{background:var(--acc);border-color:var(--acc)}
  .check input:checked::after{
    content:"";position:absolute;left:5px;top:2px;width:4px;height:8px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);
  }

  /* export code */
  .code-wrap{position:relative}
  textarea#svgcode{
    width:100%;height:120px;resize:vertical;
    font-family:inherit;font-size:10.5px;line-height:1.45;
    background:var(--bg);color:var(--txt-dim);
    border:1px solid var(--line);border-radius:8px;padding:10px;
    white-space:pre;overflow:auto;
  }
  textarea#svgcode:focus{outline:2px solid var(--acc);outline-offset:1px;color:var(--txt)}

  .dim-label{font-size:11px;color:var(--txt-faint);text-align:center}
  .dim-label b{color:var(--txt-dim);font-weight:500}

  /* walidator systemu */
  .stats{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;align-items:center;width:100%}
  .badge{
    font-size:11px;padding:5px 11px;border-radius:7px;
    border:1px solid var(--line);background:var(--panel-2);color:var(--txt-dim);
    transition:color .12s,border-color .12s;
  }
  .badge b{font-weight:700}
  .badge.ok{color:#8fe3ae;border-color:#2c4a38}
  .badge.warn{color:#ffd08a;border-color:#54452a}
  .badge.bad{color:var(--danger);border-color:#5a2f33}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--acc);color:#fff;font-size:12px;font-weight:700;
    padding:9px 18px;border-radius:9px;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:820px){
    .layout{grid-template-columns:1fr}
    body{padding:14px}
  }
  @media(prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="grid7">7×7</span> generator wzorków</h1>
    <span class="sub">rysuj · wybieraj ikony · eksportuj do SVG</span>
  </header>

  <div class="layout">
    <!-- CANVAS -->
    <div class="stage">
      <div class="board-frame">
        <svg id="board" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="stats">
        <span class="badge" id="inkBadge" title="Budżet tuszu: 10–16 px OK, 17–20 px dopuszczalne dla ramek, poza tym za mało / za dużo">tusz: <b>0 px</b></span>
        <span class="badge" id="winBadge" title="Gęstość lokalna: żadne okno 3×3 nie może mieć więcej niż 5/9 wypełnionych pikseli">okno 3×3: <b>max 0/9</b></span>
        <span class="badge" id="boxBadge" title="Pole bazowe (keyshape): 7×7, 5×7, 7×5 lub 5×5 — zawsze wycentrowane">pole: <b>—</b></span>
        <label class="check">
          <input type="checkbox" id="validator" checked>
          podświetlaj zagęszczenia
        </label>
      </div>
      <div class="stage-tools">
        <button id="clear" class="ghost">Wyczyść</button>
        <button id="invert" class="ghost">Odwróć</button>
        <button id="fill" class="ghost">Wypełnij</button>
        <button id="shift" class="ghost" title="Przesuń wzór o 1 w prawo/dół">Przesuń ↘</button>
      </div>
      <div class="dim-label">wymiar eksportu: <b id="dims">—</b></div>
    </div>

    <!-- PANEL -->
    <div class="panel">

      <div class="card">
        <h2>Popularne ikony</h2>
        <div class="icons" id="iconGrid"></div>
      </div>

      <div class="card">
        <h2>Losuj wzór</h2>
        <div class="ctrl">
          <label>Symetria <span class="val" id="symName">4-osiowa</span></label>
          <select id="sym">
            <option value="quad" selected>Symetria 4-osiowa</option>
            <option value="h">Lustro poziome</option>
            <option value="v">Lustro pionowe</option>
            <option value="rot">Obrót 180°</option>
            <option value="none">Bez symetrii</option>
          </select>
        </div>
        <button id="randomize" class="primary" style="width:100%">Losuj wzór</button>
      </div>

      <div class="card">
        <h2>Wygląd</h2>
        <div class="color-row">
          <div class="color-field">
            <span>Kolor</span>
            <div class="color-input">
              <input type="color" id="fgColor" value="#e7e6f0">
              <input type="text" id="fgHex" value="#E7E6F0" maxlength="7">
            </div>
          </div>
          <div class="color-field">
            <span>Tło</span>
            <div class="color-input">
              <input type="color" id="bgColor" value="#0e0e13">
              <input type="text" id="bgHex" value="#0E0E13" maxlength="7">
            </div>
          </div>
        </div>
        <label class="check" style="margin-top:12px">
          <input type="checkbox" id="transparent" checked>
          Tło przezroczyste
        </label>
      </div>

      <div class="card">
        <h2>Eksport</h2>
        <div class="btn-row" style="margin-bottom:10px">
          <button id="copySvg" class="primary">Kopiuj SVG</button>
          <button id="dlSvg">Pobierz .svg</button>
          <button id="dlPng">Pobierz .png</button>
        </div>
        <div class="code-wrap">
          <textarea id="svgcode" readonly spellcheck="false"></textarea>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const N = 7;
let grid = new Array(N*N).fill(0);

// ---------- icon library (7x7 bitmaps, zgodne z systemem: tusz 10–16, okno 3×3 ≤ 5/9, kreska 1 px, pola bazowe 7×7 / 5×7 / 7×5 / 5×5) ----------
const ICONS = {
  serce:      ["0110110","1001001","1000001","1000001","0100010","0010100","0001000"],
  gwiazdka:   ["0001000","0101010","0000000","1101011","0000000","0101010","0001000"],
  strzalka:   ["0000000","0000100","0000010","1111111","0000010","0000100","0000000"],
  ptaszek:    ["0000001","0000010","1000100","0101000","0010000","0000000","0111110"],
  krzyzyk:    ["1000001","0100010","0010100","0001000","0010100","0100010","1000001"],
  plus:       ["0001000","0001000","0001000","1111111","0001000","0001000","0001000"],
  dom:        ["0001000","0010100","0100010","0100010","0100010","0100010","0111110"],
  diament:    ["0001000","0010100","0100010","1001001","0100010","0010100","0001000"],
  kolo:       ["0011100","0100010","1000001","1000001","1000001","0100010","0011100"],
  ramka:      ["0000000","0111110","0100010","0100010","0100010","0111110","0000000"],
  blyskawica: ["0000010","0000100","0001000","0111110","0001000","0010000","0100000"],
  usmiech:    ["0000000","0100010","0100010","0000000","1000001","0111110","0000000"],
  // — motion —
  odtwarzaj:  ["0100000","0110000","0101000","0100110","0101000","0110000","0100000"],
  pauza:      ["0100010","0100010","0100010","0100010","0100010","0100010","0100010"],
  nastepna:   ["0000010","0100010","0010010","0001010","0010010","0100010","0000010"],
  przewin:    ["0000000","0001010","0010100","0101000","0010100","0001010","0000000"],
  szybciej:   ["0000000","0101000","0010100","0001010","0010100","0101000","0000000"],
  os_czasu:   ["0011100","0001000","0001000","0001000","0001000","0001000","1111111"],
  klatka:     ["0000000","0001000","0010100","1100011","0010100","0001000","0000000"],
  warstwy:    ["0011100","0000000","0000000","0111110","0000000","0000000","1111111"],
  kadr:       ["1100011","1000001","0000000","0000000","0000000","1000001","1100011"],
  audio:      ["0001000","0001000","1001001","1001001","1001001","0001000","0001000"],
  eksport:    ["0001000","0010100","0100010","0001000","0000000","1000001","1111111"],
  krzywa:     ["0000011","0000100","0000100","0001000","0001000","0010000","1110000"],
};

// ---------- geometry (stałe — suwaki wyglądu usunięte) ----------
const CELL = 40, GAP = 0, RAD = 0;
function geo(){
  const unit = CELL + GAP;
  const total = N*CELL + (N-1)*GAP;
  return {cell:CELL, gap:GAP, unit, total, rad:RAD};
}

// ---------- board render (interactive, WYSIWYG) ----------
const board = document.getElementById('board');
function drawBoard(){
  const g = geo();
  board.setAttribute('viewBox', `0 0 ${g.total} ${g.total}`);
  const fg = fgHex.value, guide = getComputedStyle(document.documentElement).getPropertyValue('--guide').trim();
  const showBg = !transparentEl.checked;
  let s = '';
  if(showBg) s += `<rect x="0" y="0" width="${g.total}" height="${g.total}" fill="${bgHex.value}"/>`;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const i=r*N+c, x=c*g.unit, y=r*g.unit;
      const on = grid[i];
      // komórki wyłączone są przezroczyste (tło prześwituje), siatkę rysuje obrys
      const fill = on ? fg : 'transparent';
      s += `<rect class="cell" data-i="${i}" x="${x}" y="${y}" width="${g.cell}" height="${g.cell}" rx="${Math.min(g.rad,g.cell/2)}" fill="${fill}"${on?'':` stroke="${guide}" stroke-width="1"`}/>`;
    }
  }
  s += '<g id="violLayer"></g>';
  board.innerHTML = s;
  updateExport();
}

// ---------- painting (click + drag) ----------
let painting=false, paintVal=1;
function cellFromEvent(e){
  const t = document.elementFromPoint(e.clientX, e.clientY);
  if(t && t.classList.contains('cell')) return +t.dataset.i;
  return -1;
}
function applyPaint(i){
  if(i<0) return;
  if(grid[i]!==paintVal){
    grid[i]=paintVal;
    const el = board.querySelector(`[data-i="${i}"]`);
    if(el){
      if(paintVal){
        el.setAttribute('fill', fgHex.value);
        el.removeAttribute('stroke');
        el.removeAttribute('stroke-width');
      } else {
        el.setAttribute('fill', 'transparent');
        el.setAttribute('stroke', getComputedStyle(document.documentElement).getPropertyValue('--guide').trim());
        el.setAttribute('stroke-width', '1');
      }
    }
    updateExport();
  }
}
board.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const i=cellFromEvent(e);
  if(i<0) return;
  paintVal = grid[i] ? 0 : 1;   // first cell decides paint vs erase
  painting=true;
  board.setPointerCapture(e.pointerId);
  applyPaint(i);
});
board.addEventListener('pointermove',e=>{ if(painting) applyPaint(cellFromEvent(e)); });
board.addEventListener('pointerup',()=>painting=false);
board.addEventListener('pointercancel',()=>painting=false);

// ---------- export SVG string ----------
function buildSVG(){
  const g = geo();
  const showBg = !transparentEl.checked;
  const rx = Math.min(g.rad, g.cell/2);
  let rects='';
  if(showBg) rects += `\n  <rect x="0" y="0" width="${g.total}" height="${g.total}" fill="${bgHex.value}"/>`;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      if(grid[r*N+c]){
        const x=c*g.unit, y=r*g.unit;
        rects += `\n  <rect x="${x}" y="${y}" width="${g.cell}" height="${g.cell}"${rx?` rx="${rx}"`:''} fill="${fgHex.value}"/>`;
      }
    }
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${g.total}" height="${g.total}" viewBox="0 0 ${g.total} ${g.total}">${rects}\n</svg>`;
}
function updateExport(){
  const g = geo();
  document.getElementById('dims').textContent = `${g.total} × ${g.total} px`;
  document.getElementById('svgcode').value = buildSVG();
  updateValidator();
}

// ---------- walidator systemu (budżet tuszu + okno 3×3) ----------
const INK_MIN = 10, INK_MAX = 16, INK_FRAME = 20, WIN_LIMIT = 5;
const validatorEl = document.getElementById('validator');
function windowStats(g){
  g = g || grid;
  let max = 0;
  const bad = new Set();
  for(let r0=0;r0<=N-3;r0++)for(let c0=0;c0<=N-3;c0++){
    let s = 0;
    for(let r=r0;r<r0+3;r++)for(let c=c0;c<c0+3;c++) s += g[r*N+c];
    if(s > max) max = s;
    if(s > WIN_LIMIT){
      for(let r=r0;r<r0+3;r++)for(let c=c0;c<c0+3;c++){
        if(g[r*N+c]) bad.add(r*N+c);
      }
    }
  }
  return {max, bad};
}
// pola bazowe: [rMin,rMax,cMin,cMax] — 7×7, 5×7, 7×5, 5×5, zawsze wycentrowane
const KEYSHAPES = [[0,6,0,6],[0,6,1,5],[1,5,0,6],[1,5,1,5]];
function bbox(g){
  let rmin=N, rmax=-1, cmin=N, cmax=-1;
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(g[r*N+c]){
      if(r<rmin)rmin=r; if(r>rmax)rmax=r;
      if(c<cmin)cmin=c; if(c>cmax)cmax=c;
    }
  }
  return {rmin,rmax,cmin,cmax};
}
function updateValidator(){
  const ink = grid.reduce((a,b)=>a+b,0);
  const {max, bad} = windowStats(grid);

  const inkB = document.getElementById('inkBadge');
  let inkState;
  if(ink >= INK_MIN && ink <= INK_MAX) inkState = 'ok';
  else if(ink > INK_FRAME) inkState = 'bad';
  else inkState = 'warn'; // za mało (<10) albo strefa ramek (17–20)
  inkB.innerHTML = `tusz: <b>${ink} px</b>`;
  inkB.className = 'badge ' + inkState;

  const winB = document.getElementById('winBadge');
  winB.innerHTML = `okno 3×3: <b>max ${max}/9</b>`;
  winB.className = 'badge ' + (max > WIN_LIMIT ? 'bad' : 'ok');

  // pole bazowe (keyshape): 7×7, 5×7, 7×5 lub 5×5 — wycentrowane
  const boxB = document.getElementById('boxBadge');
  if(ink === 0){
    boxB.innerHTML = 'pole: <b>—</b>';
    boxB.className = 'badge';
  } else {
    let {rmin,rmax,cmin,cmax} = bbox(grid);
    const w = cmax-cmin+1, h = rmax-rmin+1;
    const boxOk =
      (h===7 && w===7) ||
      (h===7 && w===5 && cmin===1) ||
      (w===7 && h===5 && rmin===1) ||
      (w===5 && h===5 && rmin===1 && cmin===1);
    boxB.innerHTML = `pole: <b>${w}×${h}</b>`;
    boxB.className = 'badge ' + (boxOk ? 'ok' : 'bad');
  }

  const layer = board.querySelector('#violLayer');
  if(!layer) return;
  if(!validatorEl.checked || bad.size === 0){
    layer.innerHTML = '';
    return;
  }
  const g = geo();
  const rx = Math.min(g.rad, g.cell/2);
  let s = '';
  bad.forEach(i=>{
    const r = Math.floor(i/N), c = i%N;
    s += `<rect x="${c*g.unit}" y="${r*g.unit}" width="${g.cell}" height="${g.cell}"${rx?` rx="${rx}"`:''} fill="var(--danger)" fill-opacity="0.55" pointer-events="none"/>`;
  });
  layer.innerHTML = s;
}
validatorEl.onchange = updateValidator;

// ---------- tools ----------
function refresh(){ drawBoard(); }
document.getElementById('clear').onclick = ()=>{ grid.fill(0); refresh(); };
document.getElementById('fill').onclick  = ()=>{ grid.fill(1); refresh(); };
document.getElementById('invert').onclick= ()=>{ grid=grid.map(v=>v?0:1); refresh(); };
document.getElementById('shift').onclick = ()=>{
  const ng=new Array(N*N).fill(0);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(grid[r*N+c]) ng[((r+1)%N)*N+((c+1)%N)]=1;
  }
  grid=ng; refresh();
};

// ---------- icons ----------
function loadIcon(name){
  const rows = ICONS[name];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++) grid[r*N+c] = rows[r][c]==='1'?1:0;
  refresh();
}
(function buildIconGrid(){
  const wrap = document.getElementById('iconGrid');
  for(const name in ICONS){
    const rows = ICONS[name];
    let cells='';
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){
      if(rows[r][c]==='1') cells+=`<rect x="${c}" y="${r}" width="1" height="1"/>`;
    }
    const b = document.createElement('button');
    b.className='icon-btn'; b.title=name;
    b.innerHTML=`<svg viewBox="0 0 7 7">${cells}</svg>`;
    b.onclick=()=>loadIcon(name);
    wrap.appendChild(b);
  }
})();

// ---------- randomizer (generuje wyłącznie wzory zgodne z systemem) ----------
const symEl = document.getElementById('sym');
const SYM_NAMES = {quad:'4-osiowa',h:'poziome',v:'pionowe',rot:'obrót 180°',none:'brak'};
function orbit(r,c,mode){
  const R = 6-r, C = 6-c;   // pola bazowe są wycentrowane, więc oś zawsze na 3
  if(mode==='h')    return [[r,c],[r,C]];
  if(mode==='v')    return [[r,c],[R,c]];
  if(mode==='quad') return [[r,c],[r,C],[R,c],[R,C]];
  if(mode==='rot')  return [[r,c],[R,C]];
  return [[r,c]];
}
function tryGen(mode, ks){
  const [rA,rB,cA,cB] = ks;
  const g = new Array(N*N).fill(0);
  const cells = [];
  for(let r=rA;r<=rB;r++)for(let c=cA;c<=cB;c++) cells.push([r,c]);
  for(let i=cells.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [cells[i],cells[j]]=[cells[j],cells[i]]; }
  let ink = 0;
  for(const [r,c] of cells){
    if(ink >= INK_MAX) break;
    const seen = new Set(), uniq = [];
    for(const [R,C] of orbit(r,c,mode)){
      const k = R*N+C;
      if(!g[k] && !seen.has(k)){ seen.add(k); uniq.push([R,C]); }
    }
    if(!uniq.length || ink+uniq.length > INK_MAX) continue;
    uniq.forEach(([R,C])=>{ g[R*N+C]=1; });
    if(windowStats(g).max > WIN_LIMIT){ uniq.forEach(([R,C])=>{ g[R*N+C]=0; }); continue; }
    ink += uniq.length;
  }
  if(ink < INK_MIN) return null;
  const b = bbox(g);
  if(b.rmin!==rA || b.rmax!==rB || b.cmin!==cA || b.cmax!==cB) return null;  // musi wypełnić pole bazowe
  return g;
}
function randomize(){
  const mode = symEl.value;
  for(let attempt=0; attempt<600; attempt++){
    const ks = KEYSHAPES[(Math.random()*KEYSHAPES.length)|0];
    const g = tryGen(mode, ks);
    if(g){ grid = g; refresh(); return; }
  }
  toast('Nie znaleziono wzoru — spróbuj ponownie');
}
document.getElementById('randomize').onclick = randomize;
symEl.onchange = ()=>{ document.getElementById('symName').textContent = SYM_NAMES[symEl.value]; };

// ---------- appearance controls ----------
const transparentEl=document.getElementById('transparent');
const fgColor=document.getElementById('fgColor'), fgHex=document.getElementById('fgHex');
const bgColor=document.getElementById('bgColor'), bgHex=document.getElementById('bgHex');

transparentEl.onchange=drawBoard;

function syncColor(picker,hex){
  picker.oninput=()=>{ hex.value=picker.value.toUpperCase(); drawBoard(); };
  hex.oninput=()=>{
    let v=hex.value.trim(); if(v[0]!=='#')v='#'+v;
    if(/^#[0-9a-fA-F]{6}$/.test(v)){ picker.value=v; drawBoard(); }
  };
}
syncColor(fgColor,fgHex);
syncColor(bgColor,bgHex);

// ---------- export actions ----------
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1600);
}
function download(name, blob){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
document.getElementById('copySvg').onclick=async()=>{
  try{ await navigator.clipboard.writeText(buildSVG()); toast('Skopiowano SVG'); }
  catch{ document.getElementById('svgcode').select(); document.execCommand('copy'); toast('Skopiowano SVG'); }
};
document.getElementById('dlSvg').onclick=()=>{
  download('wzor-7x7.svg', new Blob([buildSVG()],{type:'image/svg+xml'}));
  toast('Pobrano .svg');
};
document.getElementById('dlPng').onclick=()=>{
  const g=geo();
  const scale=Math.max(1,Math.round(512/g.total)); // ~512px+ output
  const svg=buildSVG();
  const img=new Image();
  const url=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  img.onload=()=>{
    const cv=document.createElement('canvas');
    cv.width=g.total*scale; cv.height=g.total*scale;
    const ctx=cv.getContext('2d');
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img,0,0,cv.width,cv.height);
    URL.revokeObjectURL(url);
    cv.toBlob(b=>{ download('wzor-7x7.png',b); toast('Pobrano .png'); });
  };
  img.src=url;
};

// ---------- init ----------
loadIcon('serce');
</script>
